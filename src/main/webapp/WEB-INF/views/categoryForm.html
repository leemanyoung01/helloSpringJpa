<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #27ae60; padding-bottom: 10px; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .error {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 6px;
            display: block;
        }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
        }
        .btn:hover { background: #219a52; }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            background: #545b62;
        }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div class="form-group">
        <label for="name">카테고리 이름</label>
        <input type="text" th:field="*{name}" placeholder="카테고리 이름을 입력하세요">
        <span class="error" th:errors="*{name}">오류 메시지</span>
    </div>

    <button type="submit" class="btn">등록</button>
    <a class="btn btn-secondary" th:href="@{/categories}">목록으로</a>
</form>

    <hr>
    <footer style="margin-top: 31px; color: gray; font-size: 14px;">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2271472 | 성명: 이우현'}"></p>
    </footer>

</body>
</html>
